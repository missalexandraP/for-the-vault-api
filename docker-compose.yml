version: "3.9"

services:
  api:
    build: .
    container_name: the-vault-api
    ports:
      - "3000:3000"
    volumes:
      - ./the_vault.db:/app/the_vault.db
      - ./.env:/app/.env:ro
    environment:
      - DATABASE_URL=sqlite:///./the_vault.db
      - APP_NAME=The Vault
      - DEBUG=false
      - CORS_ORIGINS=*
    restart: unless-stopped

